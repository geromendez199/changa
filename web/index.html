<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- SEO -->
    <title>changa. — Rafaela, Santa Fe</title>
    <meta name="description" content="Encontrá servicios locales en Rafaela. Plomeros, electricistas, limpieza y más. Conectate con prestadores de tu ciudad." />
    <meta name="theme-color" content="#0D0D0D" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="changa." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      * {
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: #0D0D0D;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100%;
        overscroll-behavior: none;
      }

      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0D0D0D; }
      ::-webkit-scrollbar-thumb { background: #252525; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }

      /* Selection color */
      ::selection { background: rgba(200, 255, 0, 0.25); color: #F0F0F0; }

      /* Apply Inter font globally to all text */
      div, span, p, input, textarea, button, a {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      /* Input native style override */
      input, textarea {
        background: transparent;
        border: none;
        outline: none;
        color: #F0F0F0;
      }

      /* Smooth transitions globally */
      button, a {
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
