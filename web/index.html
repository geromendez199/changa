<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- SEO -->
    <title>changa. — Rafaela, Santa Fe</title>
    <meta name="description" content="Encontrá servicios locales en Rafaela. Plomeros, electricistas, limpieza y más." />
    <meta name="theme-color" content="#0D0D0D" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="changa." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /*
        Use dvh (dynamic viewport height) so iOS Safari's collapsing
        address bar doesn't overlap the bottom nav.
      */
      html {
        height: 100%;
        background: #080808;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }

      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #080808;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        overscroll-behavior: none;
      }

      /* Let React Native Web manage the root — don't override display or position */
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* Hide all scrollbars for a clean native-like feel */
      * { scrollbar-width: none; }
      *::-webkit-scrollbar { display: none; }

      /* Font inheritance */
      div, span, p, label, input, textarea, button, a {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      /* Prevent iOS auto-zoom on input focus (needs font-size >= 16px) */
      input, textarea, select {
        font-size: 16px;
      }

      /* Text selection color */
      ::selection {
        background: rgba(200, 255, 0, 0.2);
        color: #F2F2F2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
